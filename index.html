<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m3cha1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4f86ed 75%, #667eea 100%);
            background-size: 400% 400%;
            animation: gradient 8s ease infinite;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            z-index: 10;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>hi</h1>
        <p>i will start working on this website soon :)</p>
    </div>
</body>
</html>
